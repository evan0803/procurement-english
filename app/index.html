<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>採購英文複習</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#3b82f6">
  <link rel="apple-touch-icon" href="./icons/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    :root {
      --bg: #f0f4f8;
      --card: #fff;
      --text: #1e293b;
      --muted: #64748b;
      --accent: #3b82f6;
      --green: #22c55e;
      --orange: #f97316;
      --red: #ef4444;
      --purple: #8b5cf6;
      --border: #e2e8f0;
      --radius: 14px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 600px;
      margin: 0 auto;
      padding: 16px 16px 48px;
    }

    /* ── Screens ── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0 20px;
    }
    .header-title { font-size: 1.15rem; font-weight: 700; }
    .header-sub { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .header-actions { display: flex; gap: 8px; }

    /* ── Stats ── */
    .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
    .stat-box { background: var(--card); border-radius: var(--radius); padding: 14px 10px; text-align: center; box-shadow: var(--shadow); }
    .stat-num { font-size: 1.9rem; font-weight: 800; line-height: 1; }
    .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
    .stat-new .stat-num { color: var(--accent); }
    .stat-due .stat-num { color: var(--orange); }
    .stat-total .stat-num { color: var(--green); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 5px;
      border: none; border-radius: 10px; font-size: 0.92rem; font-weight: 600;
      cursor: pointer; padding: 12px 16px;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:hover { opacity: .86; }
    .btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
    .btn-block { display: flex; width: 100%; margin-bottom: 10px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-success { background: var(--green); color: #fff; }
    .btn-ghost { background: var(--card); color: var(--muted); border: 1px solid var(--border); font-size: .82rem; padding: 8px 12px; border-radius: 8px; }
    .btn-icon { background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 6px; border-radius: 8px; line-height: 1; color: var(--muted); transition: color .15s; }
    .btn-icon:hover { color: var(--accent); }

    /* ── Pills ── */
    .pill-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .pill {
      padding: 5px 12px; border-radius: 20px; font-size: .76rem; font-weight: 500;
      border: 1px solid var(--border); background: var(--card); cursor: pointer;
      transition: all .15s; user-select: none;
    }
    .pill.on { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Panel ── */
    .panel { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 18px; margin-bottom: 14px; }
    .panel-label { font-size: .8rem; font-weight: 600; color: var(--muted); margin-bottom: 10px; }

    /* ── Import area ── */
    .import-area {
      border: 2px dashed var(--border); border-radius: var(--radius); padding: 20px;
      text-align: center; cursor: pointer; transition: border-color .15s; margin-bottom: 10px;
    }
    .import-area:hover { border-color: var(--accent); }
    #file-input { display: none; }

    /* ── Back nav ── */
    .back-btn { background: none; border: none; font-size: .85rem; color: var(--muted); cursor: pointer; padding: 4px 0 16px; display: block; }
    .back-btn:hover { color: var(--text); }

    /* ── Progress ── */
    .progress-label { text-align: center; font-size: .78rem; color: var(--muted); margin-bottom: 6px; }
    .progress-track { background: var(--border); border-radius: 4px; height: 5px; margin-bottom: 20px; overflow: hidden; }
    .progress-fill { background: var(--accent); height: 100%; border-radius: 4px; transition: width .35s ease; }

    /* ── Flashcard ── */
    .fc-wrap {
      background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 26px 22px; min-height: 200px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; margin-bottom: 16px;
      cursor: pointer; position: relative; user-select: none;
    }
    .fc-wrap:active { box-shadow: 0 1px 4px rgba(0,0,0,.06); }

    /* type badge (top-left) */
    .fc-type-badge {
      position: absolute; top: 12px; left: 14px;
      font-size: .66rem; font-weight: 700; padding: 3px 8px; border-radius: 6px;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .type-word     { background: #dbeafe; color: #1d4ed8; }
    .type-phrase   { background: #f3e8ff; color: #6d28d9; }
    .type-pattern  { background: #fef3c7; color: #92400e; }

    /* speaker button (top-right) */
    .fc-speaker {
      position: absolute; top: 10px; right: 12px;
      background: none; border: none; font-size: 1.1rem; cursor: pointer;
      color: var(--muted); padding: 4px; border-radius: 6px; line-height: 1;
      transition: color .15s;
    }
    .fc-speaker:hover { color: var(--accent); }

    .fc-cat { font-size: .7rem; color: var(--muted); margin-bottom: 10px; margin-top: 4px; }
    .fc-english { font-size: 1.55rem; font-weight: 800; line-height: 1.3; margin-bottom: 6px; }
    .fc-english.pattern { font-size: 1.2rem; text-align: left; width: 100%; }
    .fc-english .blank { color: var(--accent); border-bottom: 2px solid var(--accent); padding: 0 2px; }
    .fc-abbr { font-size: .88rem; color: var(--accent); font-weight: 600; margin-bottom: 6px; }
    .fc-hint { font-size: .78rem; color: var(--muted); margin-top: 16px; }

    /* Card back */
    .fc-answer { display: none; width: 100%; }
    .fc-zh { font-size: 1.35rem; font-weight: 700; margin-bottom: 8px; }
    .fc-phonetic { font-size: .9rem; color: var(--muted); margin-bottom: 6px; letter-spacing: .03em; }
    .fc-def-en { font-size: .82rem; color: var(--muted); line-height: 1.55; margin-bottom: 10px; }
    .fc-example-zh { font-size: .78rem; color: var(--muted); margin-top: 4px; line-height: 1.5; }
    .fc-example-row { display: flex; align-items: flex-start; gap: 8px; border-top: 1px solid var(--border); padding-top: 12px; margin-top: 6px; text-align: left; width: 100%; }
    .fc-example-text { font-size: .82rem; color: var(--muted); font-style: italic; line-height: 1.6; flex: 1; }
    .fc-notes { font-size: .78rem; color: var(--muted); border-top: 1px solid var(--border); padding-top: 10px; margin-top: 10px; text-align: left; width: 100%; line-height: 1.55; }
    .fc-notes-label { font-weight: 600; font-style: normal; }

    /* ── Rating ── */
    .rating-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 8px; }
    .btn-again { background: var(--red);    color: #fff; flex-direction: column; padding: 12px 6px; font-size: .82rem; }
    .btn-hard  { background: var(--orange); color: #fff; flex-direction: column; padding: 12px 6px; font-size: .82rem; }
    .btn-good  { background: var(--accent); color: #fff; flex-direction: column; padding: 12px 6px; font-size: .82rem; }
    .btn-easy  { background: var(--green);  color: #fff; flex-direction: column; padding: 12px 6px; font-size: .82rem; }
    .btn-sub { font-size: .67rem; opacity: .85; margin-top: 2px; font-weight: 400; }
    .interval-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; text-align: center; margin-bottom: 14px; }
    .interval-row span { font-size: .67rem; color: var(--muted); }
    .key-hint { text-align: center; font-size: .7rem; color: var(--border); margin-bottom: 6px; }

    /* ── Complete ── */
    .complete-box { text-align: center; padding: 40px 10px; }
    .complete-emoji { font-size: 3rem; margin-bottom: 14px; }
    .complete-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; }
    .complete-sub { font-size: .88rem; color: var(--muted); margin-bottom: 24px; }

    /* ── Browse ── */
    .search-input {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border);
      border-radius: 10px; font-size: .92rem; background: var(--card); outline: none; margin-bottom: 12px;
    }
    .search-input:focus { border-color: var(--accent); }
    .vocab-count { font-size: .78rem; color: var(--muted); margin-bottom: 10px; }
    .vcard { background: var(--card); border-radius: 10px; padding: 13px 15px; margin-bottom: 8px; box-shadow: var(--shadow); cursor: pointer; }
    .vcard-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .vcard-en { font-weight: 600; font-size: .95rem; }
    .vcard-zh { font-size: .83rem; color: var(--muted); margin-top: 2px; }
    .vcard-tag { font-size: .67rem; color: var(--accent); border: 1px solid var(--accent); padding: 2px 8px; border-radius: 12px; white-space: nowrap; flex-shrink: 0; }
    .vcard-detail { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .vcard.open .vcard-detail { display: block; }
    .vcard-detail-line { font-size: .82rem; color: var(--muted); line-height: 1.6; }
    .vcard-detail-line.ex { font-style: italic; }
    .vcard-detail-line.notes { margin-top: 4px; }

    /* ── Add form ── */
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: .82rem; font-weight: 600; color: var(--text); margin-bottom: 6px; display: block; }
    .form-label span { font-weight: 400; color: var(--muted); }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: .92rem; font-family: inherit;
      background: var(--card); outline: none; color: var(--text);
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
    .form-textarea { resize: vertical; min-height: 80px; line-height: 1.55; }
    .form-hint { font-size: .74rem; color: var(--muted); margin-top: 4px; }
    .type-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .type-opt { border: 2px solid var(--border); border-radius: 10px; padding: 10px 8px; text-align: center; cursor: pointer; transition: all .15s; }
    .type-opt.sel { border-color: var(--accent); background: #eff6ff; }
    .type-opt .t-icon { font-size: 1.2rem; margin-bottom: 4px; }
    .type-opt .t-label { font-size: .78rem; font-weight: 600; }
    .type-opt .t-sub { font-size: .68rem; color: var(--muted); }

    /* ── Empty ── */
    .empty-msg { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty-msg-icon { font-size: 2.2rem; margin-bottom: 10px; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(72px);
      background: #1e293b; color: #fff; padding: 11px 20px; border-radius: 10px;
      font-size: .85rem; pointer-events: none; transition: transform .28s ease;
      z-index: 9999; white-space: nowrap; max-width: 90vw; text-align: center;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Stage map (10-word gating) ── */
    .stat-overflow { font-size: .62rem; color: var(--muted); margin-top: 3px; }
    .stage-panel-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
    .stage-progress-label { font-size: .82rem; font-weight: 700; }
    .streak-badge { font-size: .78rem; font-weight: 600; color: var(--orange); white-space: nowrap; }
    .stage-map { display: flex; flex-wrap: wrap; gap: 6px; }
    .stage-cell {
      width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: .68rem; font-weight: 700; color: var(--muted); background: var(--bg); border: 1px solid var(--border);
      flex-shrink: 0; cursor: pointer;
    }
    .stage-cell.cleared { background: var(--green); color: #fff; border-color: var(--green); }
    .stage-cell.current { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.25); }

    /* ── Catch-up mode & today status panel ── */
    .catchup-status-wrap { margin-top: 10px; }
    .catchup-status-wrap:empty { margin-top: 0; }
    .catchup-line { font-size: .78rem; color: var(--muted); line-height: 1.5; margin-bottom: 8px; }
    .catchup-btn { font-size: .78rem; padding: 7px 12px; }
    .catchup-active-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .catchup-badge { font-size: .78rem; font-weight: 600; color: var(--accent); }
    .catchup-close-link { font-size: .74rem; color: var(--muted); text-decoration: underline; cursor: pointer; }
    .today-stats-row { font-size: .8rem; color: var(--muted); margin-top: 10px; }
    .today-stats-tomorrow { font-size: .74rem; color: var(--muted); margin-top: 3px; }

    /* ── 弱點特訓（功能 3）── */
    .weakest-training-row { margin-top: 12px; }
    .weakest-training-row:empty { margin-top: 0; }
    .weakest-btn { font-size: .78rem; padding: 7px 12px; }

    /* ── 關卡 popover（功能 2：點關卡看字／功能 4：複製這關單字給 Claude）── */
    .popover-backdrop {
      display: none; position: fixed; inset: 0; background: rgba(15,23,42,.55);
      z-index: 3000; align-items: center; justify-content: center; padding: 20px;
    }
    .popover-backdrop.show { display: flex; }
    .popover-card {
      background: var(--card); border-radius: var(--radius); width: min(92vw, 420px);
      max-height: 80vh; display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 12px 32px rgba(0,0,0,.25);
    }
    .popover-head {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 16px 18px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .popover-title-wrap { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .popover-title { font-size: 1rem; font-weight: 700; }
    .popover-chip { font-size: .72rem; font-weight: 600; padding: 2px 9px; border-radius: 12px; white-space: nowrap; }
    .popover-chip.st-cleared { background: var(--green); color: #fff; }
    .popover-chip.st-current { background: var(--accent); color: #fff; }
    .popover-chip.st-locked  { background: var(--border); color: var(--muted); }
    .popover-close {
      background: none; border: none; font-size: 1.2rem; line-height: 1;
      color: var(--muted); cursor: pointer; padding: 4px 6px; flex-shrink: 0;
    }
    .popover-list { overflow-y: auto; padding: 4px 18px; flex: 1; }
    .popover-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .popover-item:last-child { border-bottom: none; }
    .popover-item-icon { flex-shrink: 0; font-size: .85rem; margin-top: 1px; }
    .popover-item-en { font-weight: 600; font-size: .88rem; }
    .popover-item-zh { font-size: .8rem; color: var(--muted); margin-top: 1px; }
    .popover-foot { padding: 12px 18px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
  </style>
</head>
<body>

<!-- ══ HOME ══════════════════════════════════════════════════════════════ -->
<div id="s-home" class="screen active">
  <div class="header">
    <div>
      <div class="header-title">採購英文複習</div>
      <div class="header-sub">Procurement Business English</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="go('s-add')">＋ 新增</button>
      <button class="btn btn-ghost" onclick="go('s-browse')">瀏覽</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-box stat-new"><div class="stat-num" id="h-new">0</div><div class="stat-label">新卡片</div></div>
    <div class="stat-box stat-due">
      <div class="stat-num" id="h-due">0</div><div class="stat-label">待複習</div>
      <div class="stat-overflow" id="h-due-overflow" style="display:none"></div>
    </div>
    <div class="stat-box stat-total"><div class="stat-num" id="h-total">0</div><div class="stat-label">總詞彙</div></div>
  </div>

  <div class="panel">
    <div class="stage-panel-top">
      <div class="stage-progress-label" id="stage-progress-label"></div>
      <div class="streak-badge" id="streak-badge"></div>
    </div>
    <div class="stage-map" id="stage-map"></div>
    <div class="catchup-status-wrap" id="home-status-msg"></div>
    <div class="today-stats-row" id="today-stats-row"></div>
    <div class="today-stats-tomorrow" id="due-tomorrow-row"></div>
    <div class="weakest-training-row" id="weakest-training-row"></div>
  </div>

  <div class="panel">
    <div class="panel-label">篩選分類（不選 = 全部）</div>
    <div class="pill-row" id="h-filters"><span style="font-size:.78rem;color:var(--muted)">匯入或新增詞彙後可篩選</span></div>
  </div>

  <button class="btn btn-primary btn-block" id="h-start" onclick="startStudy()">開始複習</button>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px">
    <div class="import-area" style="margin-bottom:0" onclick="document.getElementById('file-input').click()">
      <div style="font-size:1.2rem;margin-bottom:4px">📂</div>
      <div style="font-size:.82rem;font-weight:600">匯入詞彙庫</div>
      <div style="font-size:.7rem;color:var(--muted)">選取 vocabulary.json</div>
    </div>
    <div class="import-area" style="margin-bottom:0" onclick="exportVocab()">
      <div style="font-size:1.2rem;margin-bottom:4px">⬇️</div>
      <div style="font-size:.82rem;font-weight:600">匯出詞彙庫</div>
      <div style="font-size:.7rem;color:var(--muted)">下載 vocabulary.json</div>
    </div>
  </div>
  <input type="file" id="file-input" accept=".json" onchange="importVocab(event)">
  <div id="sync-status" style="text-align:center;font-size:.7rem;color:var(--muted);padding:6px 0"></div>
</div>


<!-- ══ STUDY ══════════════════════════════════════════════════════════════ -->
<div id="s-study" class="screen">
  <button class="back-btn" onclick="go('s-home')">← 返回首頁</button>

  <div class="progress-label" id="prog-label"></div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>

  <!-- Flashcard -->
  <div class="fc-wrap" id="fc" onclick="handleFcClick(event)">
    <div class="fc-type-badge" id="fc-type-badge"></div>
    <button class="fc-speaker" id="fc-spk-front" onclick="event.stopPropagation();speakFront()" title="朗讀">🔊</button>

    <!-- Front content -->
    <div id="fc-front-content">
      <div class="fc-cat" id="fc-cat"></div>
      <div class="fc-english" id="fc-en"></div>
      <div class="fc-abbr" id="fc-abbr"></div>
      <div class="fc-hint" id="fc-hint"></div>
    </div>

    <!-- Back content (hidden until flipped) -->
    <div class="fc-answer" id="fc-answer">
      <div class="fc-cat" id="fc-cat-b"></div>
      <div class="fc-zh" id="fc-zh"></div>
      <div class="fc-phonetic" id="fc-phonetic" style="display:none"></div>
      <div class="fc-def-en" id="fc-def-en" style="display:none"></div>
      <div class="fc-example-row" id="fc-ex-row" style="display:none">
        <div>
          <div class="fc-example-text" id="fc-ex-text"></div>
          <div class="fc-example-zh" id="fc-ex-zh" style="display:none"></div>
        </div>
        <button class="btn-icon" onclick="event.stopPropagation();speakExample()" title="朗讀例句">🔊</button>
      </div>
      <div class="fc-notes" id="fc-notes" style="display:none">
        <span class="fc-notes-label">📌 </span><span id="fc-notes-text"></span>
      </div>
    </div>
  </div>

  <!-- Rating buttons -->
  <div id="rating-zone" style="display:none">
    <div class="rating-row">
      <button class="btn btn-again" onclick="rate(1)">再複習<span class="btn-sub">Again</span></button>
      <button class="btn btn-hard"  onclick="rate(2)">困難<span class="btn-sub">Hard</span></button>
      <button class="btn btn-good"  onclick="rate(4)">良好<span class="btn-sub">Good</span></button>
      <button class="btn btn-easy"  onclick="rate(5)">輕鬆<span class="btn-sub">Easy</span></button>
    </div>
    <div class="interval-row">
      <span id="iv-1" style="color:var(--red)"></span>
      <span id="iv-2" style="color:var(--orange)"></span>
      <span id="iv-4" style="color:var(--accent)"></span>
      <span id="iv-5" style="color:var(--green)"></span>
    </div>

// ══ SM-2 ═════════════════════════════════════════════════════════════════

function sm2(c, q) {
  if (q <= 2) {
    c.sm2.reps = 0;
    c.sm2.interval = q === 2 ? 1 : 0;
  } else {
    const r = c.sm2.reps;
    if (r === 0)      c.sm2.interval = 1;
    else if (r === 1) c.sm2.interval = 6;
    else              c.sm2.interval = Math.round(c.sm2.interval * c.sm2.ef);
    if (q === 5)      c.sm2.interval = Math.round(c.sm2.interval * 1.3);
    c.sm2.reps++;
    c.sm2.ef = Math.max(1.3, c.sm2.ef + 0.1 - (5 - q) * (0.08 + (5 - q) * 0.02));
  }
  const next = new Date();
  next.setDate(next.getDate() + Math.max(1, c.sm2.interval));
  c.sm2.next = next.toISOString().slice(0, 10);
  return c;
}

function previewDays(c, q) {
  const t = JSON.parse(JSON.stringify(c));
  sm2(t, q);
  const d = t.sm2.interval;
  if (!d || d <= 0) return '<1天';
  if (d === 1) return '明天';
  if (d < 7)  return d + '天';
  if (d < 30) return Math.round(d / 7) + '週';
  return Math.round(d / 30) + '個月';
}

function todayStr() { return new Date().toISOString().slice(0, 10); }
function isNew(c)   { return !c.sm2?.next; }
function isDue(c)   { return c.sm2?.next && c.sm2.next <= todayStr(); }
function isDueOrNew(c) { return isNew(c) || isDue(c); }
function defSm2()   { return { reps: 0, interval: 0, ef: 2.5, next: null }; }

// ══ Stage system (10-word gating) ═══════════════════════════════════════════
const STAGE_SIZE = 10;
const DAILY_DUE_CAP = 20;
const GRADUATE_REPS = 2;
const STAGE_CLEARED_KEY = 'prcmt_stage_cleared_v1';
const STREAK_KEY = 'prcmt_streak_v1';

function isGraduated(c) { return (c.sm2?.reps || 0) >= GRADUATE_REPS; }

// Sort by (created_at asc, id asc). Cards without created_at (this-session
// manual additions not yet synced to Supabase) sort to the very end, so they
// land in the last stage instead of disturbing existing stage boundaries.
function getSortedCards(cards) {
  return [...cards].sort((a, b) => {
    const ca = a.created_at || '9999-12-31T23:59:59.999Z';
    const cb = b.created_at || '9999-12-31T23:59:59.999Z';
    if (ca !== cb) return ca < cb ? -1 : 1;
    if (a.id < b.id) return -1;
    if (a.id > b.id) return 1;
    return 0;
  });
}

// Cut the full sorted card list into STAGE_SIZE-sized stages (last one may be short).
function getStages(cards) {
  const sorted = getSortedCards(cards);
  const stages = [];
  for (let i = 0; i < sorted.length; i += STAGE_SIZE) stages.push(sorted.slice(i, i + STAGE_SIZE));
  return stages;
}

// First stage that still has an ungraduated card. -1 = every stage graduated.
function getCurrentStageIndex(stages) {
  for (let i = 0; i < stages.length; i++) {
    if (stages[i].some(c => !isGraduated(c))) return i;
  }
  return -1;
}

// Pure queue builder — no DOM / localStorage / network access, so it can be
// unit-tested directly with plain mock data (see scratchpad stage-logic test).
// opts: { cats: string[] (category filter, [] = all), clearedToday: boolean, catchUp: boolean }
// catchUp=true surfaces the current stage's learned-but-ungraduated, not-yet-due cards
// as an "ahead review" tail on the due queue, so a stage can graduate the same day.
// Returns { due, newCards, dueTotal, curIdx, stageCount, stages, aheadCount }
function computeQueues(cards, opts = {}) {
  const cats = opts.cats || [];
  const clearedToday = !!opts.clearedToday;
  const catchUp = !!opts.catchUp;

  const stages = getStages(cards);
  const curIdx = getCurrentStageIndex(stages);

  const pool = cats.length ? cards.filter(c => cats.includes(c.category)) : cards;
  const poolIds = new Set(pool.map(c => c.id));

  const dueAll = pool.filter(isDue).sort((a, b) => {
    const na = a.sm2.next, nb = b.sm2.next;
    return na < nb ? -1 : na > nb ? 1 : 0;
  });
  let due = dueAll.slice(0, DAILY_DUE_CAP);

  // Catch-up (趕進度): pull the current stage's learned-but-ungraduated, not-yet-due
  // cards forward so the stage can graduate today. Never added while the due backlog
  // is over the daily cap — clearing old reviews stays first.
  let aheadCount = 0;
  if (catchUp && curIdx >= 0 && dueAll.length <= DAILY_DUE_CAP) {
    const ahead = stages[curIdx].filter(c => poolIds.has(c.id) && !isNew(c) && !isGraduated(c) && !isDue(c));
    aheadCount = ahead.length;
    due = [...due, ...ahead];
  }

  let newCards = [];
  if (curIdx >= 0 && dueAll.length <= DAILY_DUE_CAP && !clearedToday) {
    newCards = stages[curIdx].filter(c => poolIds.has(c.id) && isNew(c)).slice(0, STAGE_SIZE);
  }

  return { due, newCards, dueTotal: dueAll.length, curIdx, stageCount: stages.length, stages, aheadCount };
}

// Did rating this card just finish clearing its stage (all cards now graduated)?
// wasGraduatedBefore/isGraduatedAfter must be read relative to this one card;
// the rest of the stage cannot change during a single rate() call.
function didCompleteStage(stages, stageIdx, cardId, wasGraduatedBefore, isGraduatedAfter) {
  if (stageIdx < 0 || !stages[stageIdx]) return false;
  const othersGraduated = stages[stageIdx].filter(x => x.id !== cardId).every(isGraduated);
  return othersGraduated && !wasGraduatedBefore && isGraduatedAfter;
}

function getStageClearedDate() {
  try { return localStorage.getItem(STAGE_CLEARED_KEY) || null; } catch { return null; }
}
function setStageClearedDate(d) {
  try { localStorage.setItem(STAGE_CLEARED_KEY, d); } catch {}
}

// Thin stateful wrapper around computeQueues() for real app use.
function currentQueues() {
  const catchUp = isCatchUpActive();
  return computeQueues(DB.cards, { cats: S.cats, clearedToday: getStageClearedDate() === todayStr() && !catchUp, catchUp });
}

// ══ Streak ═══════════════════════════════════════════════════════════════

function isYesterday(dateStr, todayVal) {
  if (!dateStr) return false;
  const d = new Date(dateStr + 'T00:00:00');
  const t = new Date(todayVal + 'T00:00:00');
  if (isNaN(d) || isNaN(t)) return false;
  return Math.round((t - d) / 86400000) === 1;
}

// Pure: given previous {lastStudyDate, streak} and today's date string,
// returns the updated state. Same day = unchanged; consecutive day = +1;
// gap (or first-ever study) = reset to 1.
function computeStreak(prev, todayVal) {
  const p = prev || { lastStudyDate: null, streak: 0 };
  if (p.lastStudyDate === todayVal) return { lastStudyDate: todayVal, streak: p.streak };
  if (isYesterday(p.lastStudyDate, todayVal)) return { lastStudyDate: todayVal, streak: p.streak + 1 };
  return { lastStudyDate: todayVal, streak: 1 };
}

function loadStreak() {
  try { return JSON.parse(localStorage.getItem(STREAK_KEY)) || { lastStudyDate: null, streak: 0 }; }
  catch { return { lastStudyDate: null, streak: 0 }; }
}
function saveStreak(s) {
  try { localStorage.setItem(STREAK_KEY, JSON.stringify(s)); } catch {}
}
function bumpStreak() {
  const updated = computeStreak(loadStreak(), todayStr());
  saveStreak(updated);
  return updated;
}

// ══ Speech ════════════════════════════════════════════════════════════════

function speak(text) {
  if (!('speechSynthesis' in window)) { toast('此瀏覽器不支援語音功能'); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.88;
  speechSynthesis.speak(u);
}

function speakFront() {
  const c = S.queue[S.idx];

}

function speakExample() {

// ══ Import ════════════════════════════════════════════════════════════════

function importVocab(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const src = JSON.parse(ev.target.result);
      const list = src.vocabulary;
      if (!Array.isArray(list)) throw new Error('缺少 vocabulary 陣列');
      let added = 0;
      list.forEach((v, i) => {
        const id = v.id || 'import_' + Date.now() + '_' + i;
        const card = { ...v, id, sm2: sm2Cache[id] || defSm2() };
        const ci = DB.cards.findIndex(c => c.id === id);
        if (ci >= 0) Object.assign(DB.cards[ci], card);
        else { DB.cards.push(card); added++; }
      });
      toast('✅ 匯入完成：' + list.length + ' 筆（新增 ' + added + ' 筆）');
      refreshHome();
    } catch (err) { toast('匯入失敗：' + err.message); }
  };
  r.readAsText(file);
  e.target.value = '';
}

// ══ Session ═══════════════════════════════════════════════════════════════

let S = { queue: [], idx: 0, reviewed: 0, flipped: false, cats: [] };

function startStudy() {
  if (!DB.loaded) { toast('詞彙庫載入中，請稍候…'); return; }
  if (!DB.cards.length) { toast('請先新增或匯入詞彙'); return; }
  const { due, newCards } = currentQueues();
  const queue = [...due, ...newCards].sort(() => Math.random() - 0.5);
  if (!queue.length) { toast('今天沒有待複習的卡片 🎉'); return; }
  S = { queue, idx: 0, reviewed: 0, flipped: false, cats: S.cats };
  go('s-study');
  showCard();
}

const TYPE_LABELS = { word: 'WORD', phrase: 'PHRASE', sentence_pattern: 'PATTERN' };
const TYPE_CLASSES = { word: 'type-word', phrase: 'type-phrase', sentence_pattern: 'type-pattern' };
const HINTS = {
  word: '點擊翻牌 →',
  phrase: '點擊翻牌 →',
  sentence_pattern: '口說看看 — 再翻牌 →'
};

function showCard() {
  const { queue, idx } = S;
  // Show/hide chrome
  document.getElementById('fc').style.display = '';
  document.getElementById('rating-zone').style.display = 'none';
  document.getElementById('complete-box').style.display = 'none';
  document.querySelector('.progress-track').style.display = '';
  document.querySelector('.progress-label').style.display = '';

  if (idx >= queue.length) {
    document.getElementById('fc').style.display = 'none';
    document.querySelector('.progress-track').style.display = 'none';
    document.querySelector('.progress-label').style.display = 'none';
    document.getElementById('complete-box').style.display = 'block';
    document.getElementById('complete-msg').textContent = '共複習了 ' + S.reviewed + ' 張卡片，繼續保持！';
    return;
  }

  const c = queue[idx];
  const pct = (idx / queue.length * 100).toFixed(0);
  document.getElementById('prog-label').textContent = (idx + 1) + ' / ' + queue.length;
  document.getElementById('prog-fill').style.width = pct + '%';

  // Type badge
  const badge = document.getElementById('fc-type-badge');
  badge.textContent = TYPE_LABELS[c.type] || c.type?.toUpperCase() || 'WORD';
  badge.className = 'fc-type-badge ' + (TYPE_CLASSES[c.type] || 'type-word');

  // Front
  document.getElementById('fc-cat').textContent = c.category || '';
  const enEl = document.getElementById('fc-en');
  enEl.className = 'fc-english' + (c.type === 'sentence_pattern' ? ' pattern' : '');
  enEl.innerHTML = esc(c.english || '').replace(/___/g, '<span class="blank">___</span>');
  document.getElementById('fc-abbr').textContent = c.abbreviation || '';
  document.getElementById('fc-hint').textContent = HINTS[c.type] || HINTS.word;
  document.getElementById('fc-front-content').style.display = '';

  // ── 背面（翻牌後顯示）────────────────────────────────
  document.getElementById('fc-answer').style.display = 'none';
  document.getElementById('fc-cat-b').textContent = c.category || '';

  // 中文意思
  document.getElementById('fc-zh').textContent = c.chinese || '';

  // 音標
  const phonEl = document.getElementById('fc-phonetic');
  if (c.phonetic) { phonEl.textContent = c.phonetic; phonEl.style.display = ''; }
  else phonEl.style.display = 'none';

  // 英文定義欄（Supabase 無此欄，固定隱藏）
  document.getElementById('fc-def-en').style.display = 'none';

  // 例句（英文） + 中文翻譯
  const exSentence = c.example || c.example_sentence || '';
  const exRow = document.getElementById('fc-ex-row');
  if (exSentence) {
    document.getElementById('fc-ex-text').textContent = '"' + exSentence + '"';
    const exZhEl = document.getElementById('fc-ex-zh');
    if (c.example_zh) { exZhEl.textContent = c.example_zh; exZhEl.style.display = ''; }
    else exZhEl.style.display = 'none';
    exRow.style.display = '';
  } else exRow.style.display = 'none';

  // 備注（Supabase 無此欄，固定隱藏）
  document.getElementById('fc-notes').style.display = 'none';

  S.flipped = false;
}

function handleFcClick(e) {
  // Ignore clicks on buttons inside the card
  if (e.target.tagName === 'BUTTON') return;
  flipCard();
}

function flipCard() {
  if (S.flipped) return;
  S.flipped = true;
  const c = S.queue[S.idx];
  document.getElementById('fc-front-content').style.display = 'none';
  document.getElementById('fc-answer').style.display = 'block';
  document.getElementById('rating-zone').style.display = 'block';
  // Update interval previews
  document.getElementById('iv-1').textContent = previewDays(c, 1);
  document.getElementById('iv-2').textContent = previewDays(c, 2);
  document.getElementById('iv-4').textContent = previewDays(c, 4);
  document.getElementById('iv-5').textContent = previewDays(c, 5);
}

function rate(q) {
  const c = S.queue[S.idx];

  // Snapshot stage-completion state before this rating mutates the card.
  const stagesBefore = getStages(DB.cards);
  const stageIdx = stagesBefore.findIndex(st => st.some(x => x.id === c.id));
  const wasGraduated = isGraduated(c);
  const wasNew = isNew(c); // snapshot before sm2() mutates c, for today-stats "learned" count

  sm2(c, q);
  const ci = DB.cards.findIndex(x => x.id === c.id);
  if (ci !== -1) DB.cards[ci].sm2 = c.sm2;
  upsertSm2(c);   // async，不阻塞 UI

  const stageCompleted = didCompleteStage(stagesBefore, stageIdx, c.id, wasGraduated, isGraduated(c));
  if (stageCompleted) {
    setStageClearedDate(todayStr());
    toast(isCatchUpActive()
      ? '🎉 第 ' + (stageIdx + 1) + ' 關過關！趕進度模式：可直接繼續下一關'
      : '🎉 第 ' + (stageIdx + 1) + ' 關過關！明天解鎖，或在首頁點『繼續下一關』趕進度', 4200);
  }

  const tStats = loadTodayStats();
  tStats.reviewed++;
  if (wasNew) tStats.learned++;
  if (stageCompleted) tStats.cleared++;
  saveTodayStats(tStats);

  bumpStreak();
  S.reviewed++;
  S.idx++;
  showCard();
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('s-study').classList.contains('active')) return;
  if (document.getElementById('s-add').classList.contains('active')) return;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); return; }
  if (!S.flipped) return;
  if (e.key === '1') rate(1);
  if (e.key === '2') rate(2);
  if (e.key === '3') rate(4);
  if (e.key === '4') rate(5);
});

// ══ Browse ════════════════════════════════════════════════════════════════

let bCat = 'all', bType = 'all';

function renderBrowse() {
  const q = (document.getElementById('b-search')?.value || '').toLowerCase();
  const cats = [...new Set(DB.cards.map(c => c.category).filter(Boolean))];

  const tf = document.getElementById('b-type-filters');
  tf.innerHTML = '';
  [['all','全部'],['word','單字'],['phrase','片語'],['sentence_pattern','句型'],['grammar_note','文法']].forEach(([v,l]) => {
    makePill(tf, l, bType === v, () => { bType = v; renderBrowse(); });
  });

  const fp = document.getElementById('b-filters');
  fp.innerHTML = '';
  makePill(fp, '全部分類', bCat === 'all', () => { bCat = 'all'; renderBrowse(); });
  cats.forEach(cat => makePill(fp, cat, bCat === cat, () => { bCat = cat; renderBrowse(); }));

  let list = DB.cards;
  if (bType !== 'all') list = list.filter(c => c.type === bType);
  if (bCat  !== 'all') list = list.filter(c => c.category === bCat);
  if (q) list = list.filter(c =>
    (c.english || '').toLowerCase().includes(q) ||
    (c.chinese || '').toLowerCase().includes(q)
  );

  document.getElementById('b-count').textContent = list.length + ' 筆詞彙';
  const el = document.getElementById('b-list');

  if (!list.length) {
    el.innerHTML = '<div class="empty-msg"><div class="empty-msg-icon">' +
      (DB.cards.length ? '🔍' : '📚') + '</div><div>' +
      (DB.cards.length ? '找不到符合的詞彙' : '正在載入詞彙庫…') + '</div></div>';
    return;
  }

  const typeLabel = { word: '單字', phrase: '片語', sentence_pattern: '句型', grammar_note: '文法' };

  el.innerHTML = list.map(c => {
    const enDisplay = c.type === 'sentence_pattern'
      ? esc(c.english || '').replace(/___/g, '<u>___</u>')
      : esc(c.english || '');
    let detail = '';
    if (c.phonetic)    detail += '<div class="vcard-detail-line" style="color:var(--accent)">' + esc(c.phonetic) + '</div>';
    const exS = c.example || c.example_sentence;
    if (exS)           detail += '<div class="vcard-detail-line ex">"' + esc(exS) + '"</div>';
    if (c.example_zh)  detail += '<div class="vcard-detail-line notes">' + esc(c.example_zh) + '</div>';
    return '<div class="vcard" onclick="this.classList.toggle(\'open\')">' +
      '<div class="vcard-top"><div>' +
        '<div class="vcard-en">' + enDisplay + '</div>' +
        '<div class="vcard-zh">' + esc(c.chinese || '') +
          (c.type ? ' <span style="color:var(--muted);font-size:.75em">· ' + (typeLabel[c.type] || c.type) + '</span>' : '') +
        '</div>' +
      '</div><div class="vcard-tag">' + esc(c.category || '') + '</div></div>' +
      (detail ? '<div class="vcard-detail">' + detail + '</div>' : '') +
    '</div>';
  }).join('');
}

// ══ Home ══════════════════════════════════════════════════════════════════

function refreshHome() {
  const { due, newCards, dueTotal, curIdx, stageCount, aheadCount } = currentQueues();
  const newN = newCards.length;
  const dueN = due.length; // = min(dueTotal, cap), plus ahead-review cards while catch-up is active
  document.getElementById('h-new').textContent   = newN;
  document.getElementById('h-due').textContent   = dueN;
  document.getElementById('h-total').textContent = DB.cards.length;

  const overflowEl = document.getElementById('h-due-overflow');
  if (overflowEl) {
    if (dueTotal > DAILY_DUE_CAP) {
      overflowEl.textContent = '另 ' + (dueTotal - DAILY_DUE_CAP) + ' 張排隊';
      overflowEl.style.display = '';
    } else {
      overflowEl.textContent = '';
      overflowEl.style.display = 'none';
    }
  }

  const total = newN + due.length;
  const btn = document.getElementById('h-start');
  btn.textContent = total ? '開始複習（' + total + ' 張）' : (DB.loaded ? '今天已完成 🎉' : '載入中…');
  btn.disabled = !total;

  renderStageMap(curIdx, stageCount);
  renderHomeStatus(curIdx, dueTotal, newN, stageCount, aheadCount);
  renderTodayStats();
  renderDueTomorrow();
  renderWeakestTraining();

  const fp = document.getElementById('h-filters');
  const allCats = [...new Set(DB.cards.map(c => c.category).filter(Boolean))];
  if (!allCats.length) {
    fp.innerHTML = '<span style="font-size:.78rem;color:var(--muted)">載入詞彙後顯示分類</span>';
    return;
  }
  fp.innerHTML = '';
  allCats.forEach(cat => {
    makePill(fp, cat, S.cats.includes(cat), () => {
      const i = S.cats.indexOf(cat);
      i >= 0 ? S.cats.splice(i, 1) : S.cats.push(cat);
      refreshHome();
    });
  });
}

// ══ Stage map rendering ══════════════════════════════════════════════════

function renderStageMap(curIdx, stageCount) {
  const mapEl = document.getElementById('stage-map');
  const progEl = document.getElementById('stage-progress-label');
  const streakEl = document.getElementById('streak-badge');
  if (!mapEl) return;

  if (!stageCount) {
    mapEl.innerHTML = '';
    if (progEl) progEl.textContent = '';
    if (streakEl) streakEl.textContent = '';
    return;
  }

  mapEl.innerHTML = '';
  for (let i = 0; i < stageCount; i++) {
    const cell = document.createElement('div');
    cell.className = 'stage-cell' + (curIdx === -1 || i < curIdx ? ' cleared' : i === curIdx ? ' current' : ' locked');
    cell.textContent = i + 1;
    cell.onclick = () => openStagePopover(i);
    mapEl.appendChild(cell);
  }

  if (progEl) {
    if (curIdx === -1) {
      progEl.textContent = '🎉 全部關卡已完成！';
    } else {
      const stages = getStages(DB.cards);
      const stageCards = stages[curIdx] || [];
      const graduatedCount = stageCards.filter(isGraduated).length;
      progEl.textContent = '第 ' + (curIdx + 1) + ' 關 · ' + graduatedCount + ' / ' + stageCards.length;
    }
  }

  if (streakEl) {
    const st = loadStreak();
    streakEl.textContent = st.streak > 0 ? ('🔥 連續 ' + st.streak + ' 天') : '';
  }
}

// ══ Stage popover（功能 2：點關卡看字／功能 4：複製這關單字給 Claude）══════════
let _popoverStageIdx = null;

function stageChipInfo(stageIdx, curIdx) {
  if (curIdx === -1 || stageIdx < curIdx) return { cls: 'st-cleared', label: '✅ 已過' };
  if (stageIdx === curIdx)                return { cls: 'st-current', label: '▶ 進行中' };
  return { cls: 'st-locked', label: '🔒 未解鎖' };
}

function cardStatusIcon(c) {
  if (isNew(c)) return '🆕';
  if (isGraduated(c)) return '✅';
  return '📖';
}

// Pure：組出可直接貼給 Claude 的複製文字（popover 複製鈕與過關禮共用，方便單元測試）。
function buildStageCopyText(stageIdx, cards) {
  const stages = getStages(cards);
  const stageCards = stages[stageIdx] || [];
  const lines = ['請用 materials-gen 幫我為以下採購英文詞彙產生練習教材（填空題＋情境對話）：'];
  stageCards.forEach((c, i) => lines.push((i + 1) + '. ' + (c.english || '') + ' — ' + (c.chinese || '')));
  return lines.join('\n');
}

function openStagePopover(stageIdx) {
  const stages = getStages(DB.cards);
  const stageCards = stages[stageIdx] || [];
  if (!stageCards.length) return;
  const curIdx = getCurrentStageIndex(stages);
  const chip = stageChipInfo(stageIdx, curIdx);

  _popoverStageIdx = stageIdx;

  const itemsHtml = stageCards.map(c =>
    '<div class="popover-item">' +
      '<span class="popover-item-icon">' + cardStatusIcon(c) + '</span>' +
      '<div><div class="popover-item-en">' + esc(c.english || '') + '</div>' +
      '<div class="popover-item-zh">' + esc(c.chinese || '') + '</div></div>' +
    '</div>'
  ).join('');

  document.getElementById('popover-card').innerHTML =
    '<div class="popover-head">' +
      '<div class="popover-title-wrap">' +
        '<span class="popover-title">第 ' + (stageIdx + 1) + ' 關</span>' +
        '<span class="popover-chip ' + chip.cls + '">' + chip.label + '</span>' +
      '</div>' +
      '<button type="button" class="popover-close" onclick="closeStagePopover()">✕</button>' +
    '</div>' +
    '<div class="popover-list">' + itemsHtml + '</div>' +
    '<div class="popover-foot">' +
      '<button type="button" class="btn btn-primary btn-block popover-copy-btn" onclick="copyStageWords()">📋 複製這關單字</button>' +
    '</div>';

  document.getElementById('popover-backdrop').classList.add('show');
}

function closeStagePopover() {
  document.getElementById('popover-backdrop').classList.remove('show');
  _popoverStageIdx = null;
}

function handlePopoverBackdropClick(e) {
  if (e.target.id === 'popover-backdrop') closeStagePopover();
}

function copyStageWords() {
  if (_popoverStageIdx === null) return;
  const text = buildStageCopyText(_popoverStageIdx, DB.cards);
  if (!navigator.clipboard || !navigator.clipboard.writeText) {
    toast('此瀏覽器不支援自動複製，請手動選取文字');
    return;
  }
  navigator.clipboard.writeText(text)
    .then(() => toast('已複製，貼給 Claude 產練習即可'))
    .catch(() => toast('複製失敗，請手動選取文字'));
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && _popoverStageIdx !== null) closeStagePopover();
});

// ══ Catch-up mode & today status panel ══════════════════════════════════
const CATCHUP_KEY = 'prcmt_catchup_v1';
const TODAY_STATS_KEY = 'prcmt_today_v1';

function isCatchUpActive() {
  try { return localStorage.getItem(CATCHUP_KEY) === todayStr(); } catch { return false; }
}
function setCatchUp(on) {
  try {
    if (on) localStorage.setItem(CATCHUP_KEY, todayStr());
    else localStorage.removeItem(CATCHUP_KEY);
  } catch {}
}
function handleCatchUpStart() {
  setCatchUp(true);
  toast('⚡ 趕進度模式已開啟，新關卡解鎖！');
  refreshHome();
}
function handleCatchUpStop() {
  setCatchUp(false);
  toast('趕進度模式已關閉');
  refreshHome();
}

function loadTodayStats() {
  try {
    const s = JSON.parse(localStorage.getItem(TODAY_STATS_KEY));
    if (s && s.date === todayStr()) return s;
  } catch {}
  return { date: todayStr(), reviewed: 0, learned: 0, cleared: 0 };
}
function saveTodayStats(s) {
  try { localStorage.setItem(TODAY_STATS_KEY, JSON.stringify(s)); } catch {}
}
function dueTomorrowCount() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  const tmr = d.toISOString().slice(0, 10);
  return DB.cards.filter(c => !isNew(c) && c.sm2 && c.sm2.next <= tmr).length;
}

// Home status message: catch-up toggle, or (when no new cards today) why not.
// Priority: catch-up active badge > has new cards (nothing to explain) >
// all stages done (reuses existing stage-progress-label text) > due overflow >
// today's stage cleared and locked > current stage learned but not graduated.
function renderHomeStatus(curIdx, dueTotal, newN, stageCount, aheadCount) {
  const el = document.getElementById('home-status-msg');
  if (!el) return;
  if (!stageCount) { el.innerHTML = ''; return; }

  if (isCatchUpActive()) {
    el.innerHTML =
      '<div class="catchup-active-row">' +
        '<span class="catchup-badge">⚡ 趕進度模式（今日）</span>' +
        '<a href="javascript:void(0)" class="catchup-close-link" onclick="handleCatchUpStop()">關閉</a>' +
      '</div>' +
      (aheadCount > 0 ? '<div class="catchup-line">⚡ 提前複習 ' + aheadCount + ' 張（每字連對 2 次即過關）</div>' : '');
    return;
  }

  if (newN > 0) { el.innerHTML = ''; return; }

  if (curIdx === -1) {
    el.innerHTML = ''; // 沿用既有的「🎉 全部關卡已完成！」（stage-progress-label 已顯示）
  } else if (dueTotal > DAILY_DUE_CAP) {
    el.innerHTML = '<div class="catchup-line">📚 到期 ' + dueTotal + ' 張超過每日 ' + DAILY_DUE_CAP + ' 張上限，今日先清舊帳、暫停新卡</div>';
  } else if (getStageClearedDate() === todayStr()) {
    el.innerHTML =
      '<div class="catchup-line">✅ 第 ' + curIdx + ' 關已過關！新關明天解鎖</div>' +
      '<div class="catchup-line">🎁 過關禮：點上方第 ' + curIdx + ' 關格子 → 複製單字 → 貼給 Claude 產練習</div>' +
      '<button type="button" class="btn btn-ghost catchup-btn" onclick="handleCatchUpStart()">⚡ 繼續下一關（趕進度）</button>';
  } else {
    el.innerHTML =
      '<div class="catchup-line">⏳ 第 ' + (curIdx + 1) + ' 關單字都學過了，每字連對 2 次畢業後解鎖下一關</div>' +
      '<button type="button" class="btn btn-ghost catchup-btn" onclick="handleCatchUpStart()">⚡ 提前複習，今天過關（趕進度）</button>';
  }
}

function renderTodayStats() {
  const el = document.getElementById('today-stats-row');
  if (!el) return;
  const s = loadTodayStats();
  let line = '今日：複習 ' + s.reviewed + ' ｜ 新學 ' + s.learned;
  if (s.cleared > 0) line += ' ｜ 過關 ' + s.cleared;
  el.textContent = line;
}

function renderDueTomorrow() {
  const el = document.getElementById('due-tomorrow-row');
  if (!el) return;
  el.textContent = '明日到期約 ' + dueTomorrowCount() + ' 張';
}

// ══ 弱點特訓（功能 3）═══════════════════════════════════════════════════════

// Pure：只取已開始學習的卡（排除 isNew），依 ef 升冪 → reps 升冪 → next 升冪排序，取前 n 張。
function getWeakestCards(cards, n = 5) {
  return cards
    .filter(c => !isNew(c))
    .sort((a, b) => {
      const efA = a.sm2?.ef ?? 2.5, efB = b.sm2?.ef ?? 2.5;
      if (efA !== efB) return efA - efB;
      const repsA = a.sm2?.reps ?? 0, repsB = b.sm2?.reps ?? 0;
      if (repsA !== repsB) return repsA - repsB;
      const nextA = a.sm2?.next || '', nextB = b.sm2?.next || '';
      return nextA < nextB ? -1 : nextA > nextB ? 1 : 0;
    })
    .slice(0, n);
}

function renderWeakestTraining() {
  const el = document.getElementById('weakest-training-row');
  if (!el) return;
  const weakest = getWeakestCards(DB.cards, 5);
  if (!weakest.length) { el.innerHTML = ''; return; }
  el.innerHTML = '<button type="button" class="btn btn-ghost weakest-btn" onclick="startWeakestTraining()">🎯 弱點特訓（' + weakest.length + ' 字）</button>';
}

// 沿用既有複習 session 機制（S + go('s-study') + showCard()），評分照常走 SM-2 與 Supabase 同步。
function startWeakestTraining() {
  if (!DB.loaded) { toast('詞彙庫載入中，請稍候…'); return; }
  const weakest = getWeakestCards(DB.cards, 5);
  if (!weakest.length) { toast('目前沒有可特訓的單字（需已學習過的卡片）'); return; }
  S = { queue: [...weakest], idx: 0, reviewed: 0, flipped: false, cats: S.cats };
  go('s-study');
  showCard();
}

// ══ Navigation ════════════════════════════════════════════════════════════

function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 's-home')   refreshHome();
  if (id === 's-browse') renderBrowse();
  if (id === 's-add')    { addType = 'word'; selectType('word'); populateCatSelect(); }
}

// ══ Helpers ═══════════════════════════════════════════════════════════════

function makePill(parent, label, active, fn) {
  const p = document.createElement('div');
  p.className = 'pill' + (active ? ' on' : '');
  p.textContent = label;
  p.onclick = fn;
  parent.appendChild(p);
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _toastTimer;
function toast(msg, ms = 2800) {
  clearTimeout(_toastTimer);
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  _toastTimer = setTimeout(() => t.classList.remove('show'), ms);
}

// ══ Export ════════════════════════════════════════════════════════════════

function exportVocab() {
  if (!DB.cards.length) { toast('目前沒有詞彙可匯出'); return; }
  const out = {
    version: '2.0',
    exported: new Date().toISOString().slice(0, 10),
    vocabulary: DB.cards.map(({ sm2, ...rest }) => rest)
  };
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'vocabulary.json'; a.click();
  URL.revokeObjectURL(url);
  toast('✓ 已下載 vocabulary.json（' + out.vocabulary.length + ' 筆）');
}
